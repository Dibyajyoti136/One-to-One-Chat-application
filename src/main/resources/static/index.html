<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

    <div class="login-card">
        <h1>Realtime Chat</h1>

        <input
            type="text"
            id="username"
            placeholder="Enter your name"
        >

        <button id="joinBtn">
            Join Chat
        </button>
    </div>

</div>

<!-- CHAT PAGE -->

<div id="chatPage">

    <!-- CONTACTS -->

    <div class="sidebar">

        <div class="sidebar-header">
            Contacts
        </div>

        <ul id="contactList">

            <li class="contact active" data-user="Rahul">
                <span class="dot online"></span>
                Rahul
            </li>

            <li class="contact" data-user="Priya">
                <span class="dot online"></span>
                Priya
            </li>

            <li class="contact" data-user="Amit">
                <span class="dot offline"></span>
                Amit
            </li>

            <li class="contact" data-user="Sneha">
                <span class="dot online"></span>
                Sneha
            </li>

        </ul>

    </div>

    <!-- CHAT -->

    <div class="chat-container">

        <div class="chat-header">
            <h2 id="chatUser">Rahul</h2>
        </div>

        <div class="messages" id="messages">

            <div class="message received">
                Hello 👋
            </div>

            <div class="message sent">
                Hi Rahul
            </div>

        </div>

        <div class="chat-input">

            <input
                type="text"
                id="messageInput"
                placeholder="Type a message..."
            >

            <button id="sendBtn">
                Send
            </button>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeonChat — Enter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;600&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="Style.css">
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="container">
    <div class="logo">NEONCHAT</div>
    <div class="tagline">Realtime · Encrypted · Alive</div>

    <div class="card" id="card">
      <div class="card-label">Initialize Session</div>
      <h2>Who are you?</h2>
      <p class="sub">Enter your name to join the network and connect with others in real time.</p>

      <div class="input-wrap">
        <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="20" autocomplete="off" autofocus />
        <span class="cursor-hint">↵ ENTER</span>
      </div>
      <button class="btn" id="joinBtn">Connect to Network</button>
      <div class="error-msg" id="errorMsg">⚡ Name cannot be empty</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot"></div>
    Network Online — Open multiple tabs to chat
  </div>

   <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

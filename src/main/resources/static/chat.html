<section id="chatPage" hidden>

    <aside class="sidebar">

        <div class="sidebar-header">
            <h2>Contacts</h2>
        </div>

        <ul id="userList"></ul>

    </aside>

    <main class="chat-container">

        <div class="chat-header">
            <h3 id="chatUser">
                Select User
            </h3>
        </div>

        <div id="chatMessages">

        </div>

        <div class="message-box">

            <input
                id="messageInput"
                type="text"
                placeholder="Type message">

            <button id="sendBtn">
                Send
            </button>

        </div>

    </main>

</section>
